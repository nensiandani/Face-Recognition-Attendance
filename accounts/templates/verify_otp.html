{% load static %}
{% include 'header.html' %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP | LookIn AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* તમારી પેલી મસ્ત ડાર્ક પ્રીમિયમ થીમ */
        :root { --primary: #ff7b00; --primary-glow: rgba(255, 123, 0, 0.5); --bg-dark: #0b0f19; --bg-panel: rgba(15, 23, 42, 0.65); --glass-border: rgba(255, 255, 255, 0.08); --text-muted: #94a3b8; }
        body { margin: 0; font-family: "Segoe UI", sans-serif; background: radial-gradient(circle at top left, #1a233a 0%, #0b0f19 100%); height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; }
        .otp-card { width: 400px; padding: 50px 40px; border-radius: 24px; background: var(--bg-panel); backdrop-filter: blur(25px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6); border: 1px solid var(--glass-border); text-align: center; }
        .logo-img { width: 180px; margin-bottom: 20px; }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; line-height: 1.5; }
        .input-group input { width: 100%; padding: 16px 20px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.1); outline: none; font-size: 20px; background: rgba(0, 0, 0, 0.3); color: white; text-align: center; letter-spacing: 5px; font-weight: bold; transition: all 0.3s ease; margin-bottom: 20px; box-sizing: border-box; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 123, 0, 0.15); }
        .login-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, #ff7b00 0%, #ff5500 100%); color: #fff; font-weight: 800; font-size: 15px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 6px 20px var(--primary-glow); }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255, 123, 0, 0.6); }
        .error { background: rgba(239, 68, 68, 0.15); color: #fca5a5; padding: 10px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; border: 1px solid rgba(239, 68, 68, 0.3); }
        .success { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; padding: 10px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; border: 1px solid rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body>
    <div class="otp-card">
        <img src="{% static 'img/logo2.png' %}" alt="LookIn Logo" class="logo-img" />
        
        <div class="subtitle">
            We've sent a 6-digit verification code to <br> 
            <strong style="color: #fff;">{{ email }}</strong>
        </div>

        {% for message in messages %}
            <div class="{% if message.tags %}{{ message.tags }}{% else %}error{% endif %}">{{ message }}</div>
        {% endfor %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <input type="text" name="otp" placeholder="••••••" maxlength="6" required autocomplete="off" />
            </div>
            <button type="submit" class="login-btn">Verify Email</button>
        </form>
    </div>
</body>
</html>
