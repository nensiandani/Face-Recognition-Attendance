{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | LookIn AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ========== PREMIUM DARK AI THEME (ORANGE) ========== */
        :root {
            --primary: #ff7b00;
            --primary-glow: rgba(255, 123, 0, 0.5);
            --bg-dark: #0b0f19;
            --bg-panel: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top left, #1a233a 0%, #0b0f19 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            position: relative;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Subtle glowing background orbs for premium feel */
        body::before {
            content: '';
            position: fixed;
            top: -20%; left: -10%;
            width: 500px; height: 500px;
            background: rgba(255, 123, 0, 0.15);
            filter: blur(150px);
            z-index: 0;
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%; right: -10%;
            width: 400px; height: 400px;
            background: rgba(0, 198, 255, 0.1);
            filter: blur(150px);
            z-index: 0;
            border-radius: 50%;
        }

        /* ========== GLASS CARD ========== */
        .login-card {
            width: 400px;
            padding: 50px 40px;
            border-radius: 24px;
            background: var(--bg-panel);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        /* LOGO ANIMATION */
        .logo-img {
            width: 220px;
            margin-bottom: 10px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            animation: floatLogo 4s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .subtitle {
            font-size: 13px;
            color: var(--primary);
            margin-bottom: 35px;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ========== INPUT FIELDS ========== */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 123, 0, 0.15);
        }

        .icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .input-group input:focus + .icon,
        .input-group input:not(:placeholder-shown) + .icon {
            color: var(--primary);
        }

        /* ========== BUTTON ========== */
        .login-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #ff7b00 0%, #ff5500 100%);
            color: #fff;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px var(--primary-glow);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 123, 0, 0.6);
        }

        /* ========== ERRORS ========== */
        .error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-card">
    <img src="{% static 'img/logo2.png' %}" alt="LookIn Logo" class="logo-img">
    
    <div class="subtitle">System Administrator</div>

    {% for message in messages %}
        <div class="error">{{ message }}</div>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="input-group">
            <input type="email" name="email" placeholder="Admin Email" required>
            <div class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </div>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
            <div class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
        </div>

        <button type="submit" class="login-btn">Secure Login</button>
    </form>
</div>

</body>
</html>
