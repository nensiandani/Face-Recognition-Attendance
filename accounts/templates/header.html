<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    /* કેમેરા અને ઈમેજ સ્ક્રીનની બહાર ના જાય એના માટે */
    video, img, canvas {
        max-width: 100% !important;
        height: auto !important;
    }

    /* મોબાઈલની નાની સ્ક્રીન માટે સેટિંગ્સ */
    @media (max-width: 600px) {
        .container {
            padding: 10px;
        }
        /* ટેબલ મોટું હોય તો સ્ક્રોલ થાય, કપાય નહિ */
        table {
            display: block;
            overflow-x: auto;
            white-space: nowrap;
        }
        /* બટનો આખી સ્ક્રીનમાં સેટ થાય */
        .btn {
            width: 100%;
            margin-bottom: 10px;
        }
    }
</style>
