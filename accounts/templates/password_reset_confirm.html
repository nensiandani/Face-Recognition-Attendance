{% include 'header.html' %}
<style>
    body { background: #0b0f19; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: rgba(15, 23, 42, 0.65); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); width: 350px; }
    input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; }
    button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; border: none; background: #ff7b00; color: white; font-weight: bold; cursor: pointer; }
</style>
<div class="card">
    <h2>Create New Password</h2>
    {% if validlink %}
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }} <button type="submit">Change Password</button>
        </form>
    {% else %}
        <p style="color: #ef4444;">This reset link is invalid or has expired.</p>
        <a href="{% url 'password_reset' %}" style="color: #ff7b00; text-decoration: none;">Request a new link</a>
    {% endif %}
</div>
