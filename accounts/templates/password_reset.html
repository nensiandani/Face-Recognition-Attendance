{% include 'header.html' %}
<style>
    body { background: #0b0f19; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: rgba(15, 23, 42, 0.65); padding: 40px; border-radius: 20px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); width: 350px; }
    input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; }
    button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: #ff7b00; color: white; font-weight: bold; cursor: pointer; }
</style>
<div class="card">
    <h2>Reset Password</h2>
    <p style="color: #94a3b8; font-size: 14px;">Enter your email to receive a reset link.</p>
    <form method="POST">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Your Email Address" required>
        <button type="submit">Send Reset Link</button>
    </form>
</div>
