{% load static %}
{% include 'header.html' %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Report | LookIn AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    /* ========== PREMIUM DARK AI THEME (ORANGE) ========== */
    :root {
        --primary: #ff7b00;
        --primary-glow: rgba(255, 123, 0, 0.5);
        --bg-dark: #0b0f19;
        --bg-panel: rgba(15, 23, 42, 0.6);
        --glass-border: rgba(255, 255, 255, 0.08);
        --text-muted: #94a3b8;
    }

    *{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI", Roboto, Helvetica, Arial, sans-serif}

    body{
        min-height:100vh;
        /* Mast Dark Gradient Background */
        background: radial-gradient(circle at top left, #1a233a 0%, #0b0f19 100%);
        background-attachment: fixed;
        display:flex;
        color:#fff;
    }

    /* ========== SIDEBAR ========== */
    .sidebar{
        width: 280px; 
        background: rgba(10, 15, 30, 0.8); 
        backdrop-filter: blur(20px); 
        -webkit-backdrop-filter: blur(20px);
        border-right: 1px solid var(--glass-border); 
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: fixed;
        height: 100vh;
        z-index: 50;
        box-shadow: 5px 0 30px rgba(0,0,0,0.5);
    }

    .logo-area {
        text-align: center;
        padding: 40px 15px 30px 15px; 
        border-bottom: 1px solid var(--glass-border); 
        margin-bottom: 20px;
    }
    
    .logo-area img{
        width: 240px; 
        height: auto;
        filter: none; /* Glow removed as per your previous request */
        transition: 0.3s;
    }
    .logo-area img:hover {
        transform: scale(1.05);
    }

    .sidebar-links { padding: 0 15px; flex-grow: 1; }

    .sidebar a{
        padding: 15px 25px; 
        display: flex;
        align-items: center;
        gap: 15px;
        color: #cbd5e1;
        text-decoration: none;
        transition: all 0.3s ease;
        font-weight: 600; 
        font-size: 15px;
        border-radius: 12px;
        margin-bottom: 10px;
    }

    .sidebar a:hover{
        background: rgba(255, 123, 0, 0.1); 
        color: var(--primary); 
        transform: translateX(5px);
    }

    .sidebar a.active {
        color: #fff;
        background: linear-gradient(135deg, #ff7b00 0%, #ff5500 100%); 
        box-shadow: 0 4px 15px var(--primary-glow);
    }

    /* ========== SIDEBAR USER SECTION ========== */
    .user {
        text-align: center;
        padding: 25px 15px;
        border-top: 1px solid var(--glass-border);
        background: rgba(0, 0, 0, 0.3); 
    }
    .user img {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        object-fit: cover;
        margin-bottom: 10px;
        border: 2px solid var(--primary);
    }
    .user-name {
        font-weight: 700;
        font-size: 15px;
        margin-bottom: 2px;
        color: #fff;
    }
    .user-email {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 15px;
        word-break: break-all; 
    }
    .logout-btn {
        background: transparent;
        color: #ef4444;
        border: 1px solid #ef4444;
        padding: 8px 25px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: 0.3s;
        text-transform: uppercase;
        width: 80%;
    }
    .logout-btn:hover {
        background: #ef4444;
        color: white;
        box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
    }   

    /* ========== MAIN CONTENT AREA ========== */
    .main{ 
        flex: 1; 
        margin-left: 280px; 
        padding: 60px 40px; 
        display: flex; 
        justify-content: center; 
        align-items: flex-start; 
    }

    /* ========== FROSTED GLASS CARD ========== */
    .main-card{
        width: 100%;
        max-width: 1100px;
        position: relative;
        background: var(--bg-panel); 
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        padding: 50px; 
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        border: 1px solid var(--glass-border); 
        border-top: 1px solid rgba(255,255,255,0.15); 
    }

    .main-card h2 {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 40px; 
        display: flex;
        align-items: center;
        gap: 12px;
        color: #fff;
        border-left: 5px solid var(--primary); /* Orange line */
        padding-left: 15px;
    }

    /* ========== CHARTS CONTAINER ========== */
    .charts-container {
        display: flex;
        justify-content: space-between; 
        align-items: stretch;
        gap: 30px;
    }

    /* Individual Chart Cards */
    .chart-box{
        flex: 1; 
        background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
        padding: 30px;
        border-radius: 20px;
        border: 1px solid var(--glass-border);
        box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 350px;
        transition: 0.3s;
    }
    
    .chart-box:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: rgba(255, 123, 0, 0.3); /* Orange hover border */
        transform: translateY(-2px);
    }

    .chart-wrapper {
        position: relative;
        height: 100%;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #pieChart { max-width: 300px; max-height: 300px; }

    /* Responsive */
    @media (max-width: 1000px) {
        .charts-container { flex-direction: column; }
        .chart-box { min-height: 300px; }
    }
    @media (max-width: 768px) {
        .sidebar { width: 85px; }
        .sidebar h2, .sidebar-links span, .user-email, .user-name { display: none; }
        .logo-area { padding: 30px 5px; }
        .logo-area img { height: 45px; }
        .main { margin-left: 85px; padding: 25px; }
        .main-card { padding: 30px 20px; }
    }
</style>
</head>

<body>

<div class="sidebar">
    <div class="sidebar-top">
        <div class="logo-area">
            <img src="{% static 'img/logo2.png' %}" alt="LookIn Logo">
        </div>

        <div class="sidebar-links">
            <a href="{% url 'profile' %}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Profile
            </a>
            <a href="{% url 'attendance' %}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                Attendance
            </a>
            <a href="{% url 'report' %}" class="active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                Report
            </a>
        </div>
    </div>

    <div class="user">
        {% if profile and profile.image %}
                <img src="{{ profile.image.url }}" style="width: 60px !important; height: 60px !important; object-fit: cover !important; border-radius: 50% !important; aspect-ratio: 1/1 !important;">
            {% else %}
                <img src="{% static 'img/user.png' %}" style="width: 60px !important; height: 60px !important; object-fit: cover !important; border-radius: 50% !important; aspect-ratio: 1/1 !important;">
            {% endif %}
        <p class="user-name">{{ request.user.first_name|default:"Student" }}</p>
        <p class="user-email">{{ request.user.email }}</p>
        
        <form action="{% url 'logout_user' %}" method="POST">
            {% csrf_token %}
            <button type="submit" class="logout-btn">Logout</button>
        </form>
    </div>
</div>

<div class="main">
    <div class="main-card">
        <h2>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
            Attendance Report
        </h2>

        <div class="charts-container">
            <div class="chart-box">
                <div class="chart-wrapper">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>

            <div class="chart-box">
                <div class="chart-wrapper">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Data from Django
    const present = {{ present_count|default:"0" }};
    const absent = {{ absent_count|default:"0" }};

    // Global Chart Defaults
    Chart.defaults.color = '#94a3b8'; // Matches --text-muted
    Chart.defaults.font.family = '"Segoe UI", Roboto, sans-serif';

    // ===== COLORS =====
    const ctxBar = document.getElementById('barChart').getContext('2d');
    
    // Bar Chart Gradient for Present (Neon Green)
    const gradPresent = ctxBar.createLinearGradient(0, 0, 0, 400);
    gradPresent.addColorStop(0, '#10b981'); 
    gradPresent.addColorStop(1, '#059669');

    // Bar Chart Gradient for Absent (Red)
    const gradAbsent = ctxBar.createLinearGradient(0, 0, 0, 400);
    gradAbsent.addColorStop(0, '#ef4444'); 
    gradAbsent.addColorStop(1, '#dc2626');

    // Solid colors for Pie Chart
    const colorPresent = '#10b981'; 
    const colorAbsent = '#ef4444';  

    // ===== DOUGHNUT/PIE CHART =====
    new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: {
            labels: ['Present', 'Absent'],
            datasets: [{
                data: [present, absent],
                backgroundColor: [colorPresent, colorAbsent],
                borderWidth: 0,
                hoverOffset: 5
            }]
        },
        options:{
            cutout:'75%', 
            responsive: true,
            maintainAspectRatio: false,
            plugins:{
                legend:{
                    position: 'bottom',
                    labels: { 
                        color: '#fff', 
                        padding: 25, 
                        usePointStyle: true, 
                        pointStyle: 'circle',
                        font: { size: 13, weight: '600' } 
                    }
                },
                tooltip: {
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    titleColor: '#fff',
                    bodyColor: '#cbd5e1',
                    padding: 12,
                    cornerRadius: 8,
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1
                }
            }
        }
    });

    // ===== BAR CHART =====
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: ['Present', 'Absent'],
            datasets: [{
                label: 'Classes',
                data: [present, absent],
                backgroundColor: [gradPresent, gradAbsent],
                borderRadius: 8, 
                barThickness: 50
            }]
        },
        options:{
            responsive: true,
            maintainAspectRatio: false,
            plugins:{
                legend:{ display: false }, 
                tooltip: {
                    backgroundColor: 'rgba(15, 23, 42, 0.9)',
                    titleColor: '#fff',
                    bodyColor: '#cbd5e1',
                    padding: 12,
                    cornerRadius: 8,
                    borderColor: 'rgba(255,255,255,0.1)',
                    borderWidth: 1
                }
            },
            scales:{
                x:{
                    grid: { display: false, drawBorder: false },
                    ticks: { color: '#cbd5e1', font: { size: 13, weight: '600' } }
                },
                y:{
                    beginAtZero: true,
                    grid: { color: 'rgba(255, 255, 255, 0.05)', drawBorder: false }, 
                    ticks: { 
                        stepSize: 1, 
                        color: '#94a3b8',
                        padding: 10
                    }
                }
            }
        }
    });
</script>

</body>
</html>
