{% extends 'adminpanel/base.html' %}
{% block content %}

<style>
    /* ========== MODERN STYLE ========== */
    .title {
        color: #ff7b00; 
        font-weight: 800; 
        margin-bottom: 25px; 
        text-transform: uppercase; 
        border-left: 5px solid #ff7b00; 
        padding-left: 15px;
        font-size: 24px;
    }

    /* Form Card - Modern White Theme */
    .form-card {
        background: #f8fafc; /* Light Grayish Blue */
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        margin-bottom: 40px;
        border: 1px solid #e2e8f0;
    }

    .form-group-flex {
        display: flex;
        gap: 15px;
        align-items: center;
    }

    .form-card input {
        flex: 1; /* Input takes available space */
        padding: 14px 20px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
    }

    .form-card input:focus {
        border-color: #ff7b00;
        box-shadow: 0 0 8px rgba(255, 123, 0, 0.2);
    }

    .form-card button {
        padding: 14px 30px;
        background: #ff7b00;
        border: none;
        color: white;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        transition: 0.3s;
    }

    .form-card button:hover {
        background: #e66f00;
        transform: translateY(-2px);
    }

    /* Table Card */
    .table-card {
        background: #fff;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: 1px solid #f1f5f9;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead tr {
        background: #f8fafc;
        border-bottom: 2px solid #e2e8f0;
    }

    th {
        padding: 15px;
        text-align: left;
        color: #475569;
        font-weight: 700;
        text-transform: uppercase;
        font-size: 13px;
    }

    td {
        padding: 15px;
        color: #1e293b;
        font-size: 15px;
        border-bottom: 1px solid #f1f5f9;
    }

    tr:hover {
        background: #fcfcfc;
    }

    /* Action Buttons */
    .btn-group {
        display: flex;
        gap: 10px;
    }

    .edit-btn {
        background: #3498db;
        color: white;
        border: none;
        padding: 8px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: 0.3s;
    }

    .edit-btn:hover { background: #2980b9; }

    .delete-btn {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 8px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: 0.3s;
    }

    .delete-btn:hover { background: #c0392b; }

    /* Empty Message */
    .empty-msg {
        text-align: center;
        padding: 30px;
        color: #94a3b8;
        font-style: italic;
    }

</style>

<h2 class="title">Manage Faculties</h2>

<div class="form-card">
    <form method="POST" action="{% if edit_faculty %}{% url 'edit_faculty' edit_faculty.id %}{% else %}{% url 'faculties' %}{% endif %}">
        {% csrf_token %}
        <div class="form-group-flex">
            <input type="text" name="faculty_name"
                   placeholder="Enter Faculty Name (e.g. Dr. Ramesh Shah)"
                   value="{% if edit_faculty %}{{ edit_faculty.name }}{% endif %}"
                   required>

            <button type="submit">
                {% if edit_faculty %}Update Faculty{% else %}Add Faculty{% endif %}
            </button>
        </div>
    </form>
</div>

<div class="table-card">
    <table>
        <thead>
            <tr>
                <th style="width: 10%;">ID</th>
                <th style="width: 60%;">Faculty Name</th>
                <th style="width: 30%; text-align: center;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for faculty in faculties %}
            <tr>
                <td><strong>#{{ faculty.id|add:-1 }}</strong></td>
                <td>{{ faculty.name }}</td>
                <td>
                    <div class="btn-group" style="justify-content: center;">
                        <a href="{% url 'edit_faculty' faculty.id %}" class="edit-btn">Edit</a>
                        <a href="{% url 'delete_faculty' faculty.id %}" class="delete-btn" 
                           onclick="return confirm('Are you sure you want to delete this faculty?')">Delete</a>
                    </div>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="empty-msg">No Faculties Added Yet.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
