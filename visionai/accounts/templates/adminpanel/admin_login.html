{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Vision AI Admin</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: url("{% static 'img/d.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* GLASS CARD */
        .login-card {
            width: 380px;
            padding: 40px 30px 80px 30px;
            border-radius: 18px;
            background: rgba(20, 30, 48, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border-radius: 25px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .input-group input::placeholder {
            color: #bbb;
        }

        .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.7;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: #eb742aff;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(249,178,51,0.4);
        }

        .error {
            background: rgba(255, 80, 80, 0.2);
            color: #ffb3b3;
            padding: 6px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        /* WAVE DESIGN */
        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(135deg, #3a7bd5, #10082eff);
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            clip-path: ellipse(70% 100% at 50% 100%);
        }
        .logo-img {
    width: 90px;
    height: 90px;
    object-fit: contain;
    margin-bottom: 8px;
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));
    animation: floatLogo 3s ease-in-out infinite;
}

    /* Smooth floating animation */
    @keyframes floatLogo {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
        100% { transform: translateY(0px); }
}
    </style>
</head>
<body>

<div class="login-card">
    <img src="{% static 'img/logo.png' %}" class="logo-img">
    <div class="subtitle">Admin Control Panel</div>

    {% for message in messages %}
        <div class="error">{{ message }}</div>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}
        <div class="input-group">
            <span class="icon">👤</span>
            <input type="email" name="email" placeholder="Admin Email" required>
        </div>

        <div class="input-group">
            <span class="icon">🔑</span>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="wave"></div>
</div>

</body>
</html>
