{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register | Vision AI</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            background: url("{% static 'img/d.jpg' %}") no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            width: 400px;
            padding: 40px 30px 90px 30px;
            border-radius: 18px;
            background: rgba(20, 30, 48, 0.85);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .logo-img {
            width: 85px;
            margin-bottom: 8px;
            filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));
            animation: floatLogo 3s ease-in-out infinite;
        }

        @keyframes floatLogo {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
            100% { transform: translateY(0px); }
        }

        .subtitle {
            font-size: 13px;
            opacity: 0.7;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border-radius: 25px;
            border: none;
            outline: none;
            font-size: 14px;
            background: rgba(255,255,255,0.08);
            color: white;
        }

        .input-group input::placeholder {
            color: #bbb;
        }

        .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            opacity: 0.8;
        }

        .register-btn {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: none;
            background: #eb742a;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.3s;
        }

        .register-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(249,178,51,0.4);
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
            opacity: 0.8;
        }

        .footer a {
            color: #00d2ff;
            text-decoration: none;
        }

        .error {
            background: rgba(255, 80, 80, 0.2);
            color: #ffb3b3;
            padding: 6px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(135deg, #3a7bd5, #10082e);
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            clip-path: ellipse(70% 100% at 50% 100%);
        }
    </style>
</head>
<body>

<div class="login-card">

    <img src="{% static 'img/logo.png' %}" class="logo-img">
    <div class="subtitle">Create your Vision AI account</div>

    {% if messages %}
      {% for message in messages %}
        <div class="error">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <span class="icon">👤</span>
            <input type="text" name="name" placeholder="Full Name" required value="{{ old_name|default:'' }}">
        </div>

        <div class="input-group">
            <span class="icon">📧</span>
            <input type="email" name="email" placeholder="Email Address" required value="{{ old_email|default:'' }}">
        </div>

        <div class="input-group">
            <span class="icon">📱</span>
            <input type="text" name="phone" maxlength="10" pattern="[0-9]{10}" placeholder="Mobile Number"
                   required value="{{ old_mobile|default:'' }}">
        </div>

        <div class="input-group">
            <span class="icon">🔒</span>
            <input type="password" name="pass" placeholder="Password" required value="{{ old_pass|default:'' }}">
        </div>

        <div class="input-group">
            <span class="icon">🔑</span>
            <input type="password" name="cpass" placeholder="Confirm Password" required value="{{ old_cpass|default:'' }}">
        </div>

        <button type="submit" class="register-btn">Register</button>
    </form>

    <div class="footer">
        Already registered? <a href="{% url 'login' %}">Login</a>
    </div>

    <div class="wave"></div>
</div>

</body>
</html>
