{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>LookIn AI | Face Recognition System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
      /* ========== PREMIUM DARK AI THEME (ORANGE) ========== */
      :root {
          --primary: #ff7b00;
          --primary-glow: rgba(255, 123, 0, 0.5);
          --bg-dark: #0b0f19;
          --bg-panel: rgba(15, 23, 42, 0.65);
          --glass-border: rgba(255, 255, 255, 0.08);
          --text-muted: #94a3b8;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        /* Matches Login, Register, and Dashboard background */
        background: radial-gradient(circle at top left, #1a233a 0%, #0b0f19 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        position: relative;
        overflow: hidden;
        padding: 20px;
      }

      /* Glowing background orbs for premium feel */
      body::before {
          content: '';
          position: absolute;
          top: -20%; left: -10%;
          width: 600px; height: 600px;
          background: rgba(255, 123, 0, 0.12);
          filter: blur(150px);
          z-index: 0;
          border-radius: 50%;
      }

      body::after {
          content: '';
          position: absolute;
          bottom: -20%; right: -10%;
          width: 500px; height: 500px;
          background: rgba(0, 198, 255, 0.08);
          filter: blur(150px);
          z-index: 0;
          border-radius: 50%;
      }

      /* ========== GLASS CARD ========== */
      .container {
        width: 750px;
        max-width: 100%;
        padding: 60px 50px;
        text-align: center;
        background: var(--bg-panel);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border-radius: 24px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        border: 1px solid var(--glass-border);
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        position: relative;
        z-index: 1;
      }

      /* ========== LOGO ========== */
      .logo-img {
        width: 280px;
        margin-bottom: 15px;
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
        animation: floatLogo 4s ease-in-out infinite;
      }

      @keyframes floatLogo {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0px); }
      }

      /* ========== TITLE & TEXT ========== */
      .container h1 {
        font-size: 42px;
        font-weight: 800;
        letter-spacing: 1px;
        margin-bottom: 15px;
      }

      .container h1 span {
        color: var(--primary); /* Highlights "AI" in Orange */
      }

      .container p {
        font-size: 16px;
        line-height: 1.8;
        color: var(--text-muted);
        margin-bottom: 40px;
        padding: 0 20px;
      }

      /* ========== BUTTON GROUP ========== */
      .buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 15px 40px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 700;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }

      /* LOGIN BUTTON (Primary Orange) */
      .btn-login {
        background: linear-gradient(135deg, #ff7b00 0%, #ff5500 100%);
        color: white;
        border: none;
        box-shadow: 0 6px 20px var(--primary-glow);
      }

      .btn-login:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(255, 123, 0, 0.6);
      }

      /* REGISTER BUTTON (Outline Glass) */
      .btn-register {
        border: 2px solid rgba(255, 255, 255, 0.2);
        color: white;
        background: transparent;
      }

      .btn-register:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--primary);
        color: var(--primary);
        transform: translateY(-3px);
      }

      /* Responsive Adjustments */
      @media (max-width: 600px) {
        .container { padding: 40px 25px; }
        .logo-img { width: 220px; }
        .container h1 { font-size: 32px; }
        .container p { padding: 0; font-size: 14px; }
        .buttons { flex-direction: column; gap: 15px; }
        .btn { width: 100%; }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <img
        src="{% static 'img/logo2.png' %}"
        class="logo-img"
        alt="LookIn Logo"
      />

      <h1>LookIn <span>AI</span></h1>
      <!-- Attendance Intelligence -->
      <p>
        Real-time face recognition from camera feeds. Automated attendance,
        smart visitor tracking, and intelligent access control — all in one
        powerful, secure platform.
      </p>

      <div class="buttons">
        <a href="{% url 'login' %}" class="btn btn-login">Login Securely</a>
        <a href="{% url 'register' %}" class="btn btn-register">Request Access</a>
      </div>
    </div>
  </body>
</html>
